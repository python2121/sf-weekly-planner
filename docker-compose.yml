services:
  app:
    build: .
    container_name: sf-weekly
    restart: unless-stopped
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      RUN_TIME: ${RUN_TIME:-10:30}
      TZ: ${TZ:-America/Los_Angeles}
    ports:
      - "${WEB_PORT:-7878}:5000"
    volumes:
      - type: bind
        source: ${EVENTS_VOLUME}
        target: /work/events
